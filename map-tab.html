<style>
    :root { 
        --panel-w: 340px; 
        --detail-w: 300px; 
        --main-blue: #0c3060; 
        --bg-sky: rgba(235, 248, 255, 0.98); 
    }

    #map-container { display: flex; width: 100%; height: 100%; position: relative; overflow: hidden; }
    
    /* 목록 패널 */
    #left-panel { 
        width: var(--panel-w); height: 100%; background: var(--bg-sky);
        backdrop-filter: blur(20px); border-right: 1px solid rgba(0,0,0,0.1);
        display: flex; flex-direction: column; z-index: 110; position: relative;
        transition: transform 0.3s ease-out;
    }

    /* 상세 패널 */
    #detail-panel {
        position: absolute; left: var(--panel-w); top: 0; width: var(--detail-w); height: 100%;
        background: rgba(255, 255, 255, 0.90); border-right: 1px solid rgba(0,0,0,0.1); z-index: 100;
        transform: translateX(-100%); transition: transform 0.3s ease;
        display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.05);
    }
    #detail-panel.open { transform: translateX(0); }

    #map-area { 
        flex: 1; height: 100%; position: relative; z-index: 1; 
        display: flex; flex-direction: column; 
    }
    #map { width: 100%; flex: 1; min-height: 0; }

    /* PC 728x90 하단 광고 배너만큼 빈 공간 확보 (flex-shrink 0) */
    @media (min-width: 769px) {
        #map-area::after {
            content: '';
            display: block;
            height: 90px;
            width: 100%;
            flex-shrink: 0;
            background: transparent;
        }
    }

    /* 헤더 및 필터 */
    .main-title-box { margin: 15px 16px; padding: 0; background: transparent; border: none; }
    .main-title-box h1 { margin: 0; display: flex; align-items: center; justify-content: center; }
    
    #list-header { padding: 0 16px 15px; flex-shrink: 0; }
    .filter-row { display: flex; gap: 6px; margin-top: 10px; }
    .filter-item { 
        flex: 1.5; padding: 6px 8px; border-radius: 10px; border: 1px solid #fff; 
        background: rgba(255,255,255,0.7); font-size: 0.72em; cursor: pointer; 
        text-align: center; display: flex; align-items: center; justify-content: center; min-height: 32px;
        white-space: nowrap; font-weight: 700; color: #333; transition: all 0.2s;
    }
    .filter-item:hover { background: rgba(255,255,255,0.9); }
    .home-inline-btn { flex: 0.5; font-size: 1.1em; background: #fff; }

    #list-scroll { flex: 1; overflow-y: auto; padding: 0 16px 20px; }

    .dinner-badge { background: #e0e7ff; color: #4338ca; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; margin-left: 6px; }

    /* SNS 버튼 영역 */
    .sns-buttons { display: flex; gap: 8px; margin-top: 15px; }
    .insta-btn, .kakao-btn { 
        flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
        padding: 10px 8px; border-radius: 10px; color: #fff; text-decoration: none; font-weight: 700; font-size: 0.8em;
    }
    .insta-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .kakao-btn { background: #FEE500; color: #3C1E1E; }

    /* 한줄평 섹션 */
    .review-section { margin-top: 18px; border-top: 1px solid #e5e7eb; padding-top: 14px; }
    .review-section-title { font-size: 0.9em; font-weight: 800; color: var(--main-blue); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .review-input-row { display: flex; gap: 4px; margin-bottom: 12px; align-items: stretch; width: 100%; box-sizing: border-box; }
    .review-input-row input { padding: 8px 10px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 0.85em; font-family: 'Noto Sans KR', sans-serif; outline: none; box-sizing: border-box; }
    .review-input-row input:focus { border-color: var(--main-blue); box-shadow: 0 0 0 2px rgba(12,48,96,0.1); }
    .review-input-row button { padding: 0 12px; border-radius: 8px; border: none; background: var(--main-blue); color: #fff; font-weight: 700; font-size: 0.8em; cursor: pointer; white-space: nowrap; font-family: 'Noto Sans KR', sans-serif; flex-shrink: 0; }
    .review-input-row button:active { transform: scale(0.96); }
    .review-list { display: flex; flex-direction: column; gap: 6px; }
    .review-item { padding: 8px 12px; background: #f8fafc; border-radius: 8px; font-size: 0.82em; color: #475569; line-height: 1.5; display: flex; justify-content: space-between; align-items: flex-start; }
    .review-item-text { flex: 1; word-break: break-all; }
    .review-item-date { font-size: 0.75em; color: #94a3b8; white-space: nowrap; margin-left: 8px; }
    .review-empty { font-size: 0.82em; color: #94a3b8; text-align: center; padding: 12px 0; }
    .review-cooldown-msg { font-size: 0.78em; color: #ef4444; margin-top: 4px; }

    /* ✅ PC에서 접기/펼치기 숨김 */
    .drag-handle { display: none; }

    /* 모바일 대응 */
    @media (max-width: 768px) {
        .main-title-box { display: none !important; }
        
        /* ✅ 모바일에서만 접기/펼치기 표시 */
        .drag-handle { display: flex !important; justify-content: center; padding: 12px 0 8px; cursor: pointer; }

        #left-panel { 
            position: fixed; bottom: 55px; left: 0; right: 0; width: 100%; height: 38dvh; 
            border-radius: 24px 24px 0 0; z-index: 1001; 
            transform: translateY(0);
        }
        
        #left-panel.collapsed { transform: translateY(calc(38dvh - 45px)); }
        
        #detail-panel { 
            left: 0; width: 100%; height: 38dvh; bottom: 55px; top: auto; 
            border-radius: 24px 24px 0 0; z-index: 1010; transform: translateY(calc(100% + 60px)); 
        }
        #detail-panel.open { transform: translateY(0); }
        
        .toggle-btn-text { background: #e2efff; padding: 5px 20px; border-radius: 20px; font-size: 11px; font-weight: 800; color: #5a88c0; border: 1px solid #d0e3ff; }
        
        .filter-item { min-height: 30px; }
    }

    .restaurant-card { 
        padding: 12px 14px; background: rgba(255,255,255,0.8); border-radius: 12px; 
        margin-bottom: 8px; border: 1px solid #fff; cursor: pointer;
    }
</style>

<div id="map-container">
    <div id="left-panel">
        <div class="drag-handle" onclick="toggleCollapse()"><div class="toggle-btn-text">접기 / 펼치기</div></div>
        <div class="main-title-box">
            <h1>
                <img src="Image/Woody-Table_Logo_02_cropped.png" alt="Woody-Table Logo" style="width: 100%; height: auto; max-height: 54px; object-fit: contain;">
            </h1>
        </div>
        <div id="list-header">
            <input type="text" id="searchInput" style="width:100%; padding:10px 15px; border-radius:12px; border:1px solid #fff; background:rgba(255,255,255,0.8);" placeholder="식당 검색..." oninput="filterData()">
            <div class="filter-row">
                <select id="priceFilter" class="filter-item" onchange="filterData()">
                    <option value="all">가격 전체</option>
                    <option value="7000">7,000원대</option>
                    <option value="8000">8,000원대</option>
                </select>
                <div id="dinnerToggle" class="filter-item" onclick="toggleDinner()">🌙 석식</div>
                <div id="themeToggle" class="filter-item" onclick="toggleMapTheme()">🌎 기본맵</div>
                <div class="filter-item home-inline-btn" onclick="goHome()">🏠</div>
            </div>
        </div>
        <div id="list-scroll"><div id="restaurantCards"></div></div>
    </div>

    <div id="detail-panel">
        <div style="padding: 20px 20px 10px; position: relative;">
            <span style="position: absolute; top: 20px; right: 20px; cursor: pointer; color: #64748b;" onclick="closeDetail()">✕</span>
            <div id="detailName" style="font-size: 1.3em; font-weight: 800; color: var(--main-blue);"></div>
        </div>
        <div style="padding: 0 20px 20px; overflow-y: auto; flex: 1;">
            <div id="detailDesc" style="font-size: 0.9em; color:#475569; line-height:1.6; margin-bottom:15px; word-break: keep-all;"></div>
            <div style="font-size: 0.85em; color:#64748b; background: rgba(255,255,255,0.5); padding: 12px; border-radius: 10px;">
                <p style="margin-bottom:5px;"><strong>🕒 영업 시간:</strong> <span id="detailHours"></span></p>
                <p><strong>💰 가격:</strong> <span id="detailPrice"></span></p>
            </div>
            <!-- SNS 버튼 영역 -->
            <div id="snsArea" class="sns-buttons"></div>
            <!-- 한줄평 섹션 -->
            <div class="review-section">
                <div class="review-section-title">💬 한줄평</div>
                <div class="review-input-row">
                    <input type="text" id="reviewNickname" placeholder="닉네임" maxlength="10" style="flex: 0 0 65px; min-width: 0;">
                    <input type="text" id="reviewInput" placeholder="한줄평..." maxlength="50" style="flex: 1; min-width: 0;">
                    <button onclick="submitReview()">등록</button>
                </div>
                <div id="reviewCooldownMsg"></div>
                <div id="reviewList" class="review-list"></div>
            </div>
        </div>
    </div>

    <div id="map-area"><div id="map"></div></div>
</div>

<script>
(function() {
    let restaurantsData = [];
    const homeLoc = { lat: 37.479932, lng: 126.895215 };
    let map, markerLayer, selectedMarkerId = null, markerMap = {};
    let currentTileLayer;
    
    // 테마 전환 (0: Voyager, 1: Positron, 2: Dark Matter)
    const THEMES = [
        { name: '🌎 기본맵', url: 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', bg: 'rgba(255,255,255,0.7)', color: '#333' },
        { name: '☀️ 라이트', url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', bg: '#f1f5f9', color: '#1e293b' },
        { name: '🌃 다크맵', url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', bg: '#1e293b', color: '#fff' }
    ];
    let currentThemeIndex = parseInt(localStorage.getItem('woody_map_theme')) || 0;
    
    // 파이어베이스 관련 변수
    let db;
    let unsubscribeReviews = null;

    async function initFirebase() {
        try {
            const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js');
            const { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js');
            
            const firebaseConfig = {
                apiKey: "AIzaSyAaMivo3ZBcwS5OjDjXmCo9kZo47t0rZBc",
                authDomain: "woody-table.firebaseapp.com",
                projectId: "woody-table",
                storageBucket: "woody-table.firebasestorage.app",
                messagingSenderId: "640333501525",
                appId: "1:640333501525:web:db00602be7d7e8742c30dc"
            };
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            
            window.fsCollection = collection;
            window.fsAddDoc = addDoc;
            window.fsQuery = query;
            window.fsOrderBy = orderBy;
            window.fsLimit = limit;
            window.fsOnSnapshot = onSnapshot;
            window.fsServerTimestamp = serverTimestamp;
        } catch(e) { console.error("Firebase init err:", e); }
    }

    async function init() {
        if (typeof L === 'undefined') { setTimeout(init, 100); return; }
        const isMobile = window.innerWidth <= 768;
        map = L.map('map', { zoomControl: false }).setView([isMobile ? homeLoc.lat - 0.0006 : homeLoc.lat, homeLoc.lng], 17);
        
        // 사용자가 마지막으로 선택한 테마 또는 기본 테마 로드
        const t = THEMES[currentThemeIndex];
        currentTileLayer = L.tileLayer(t.url, {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // 초기 버튼 스타일 동기화
        const tb = document.getElementById('themeToggle');
        tb.innerHTML = t.name;
        tb.style.background = t.bg;
        tb.style.color = t.color;

        markerLayer = L.layerGroup().addTo(map);

        L.marker([homeLoc.lat, homeLoc.lng], { 
            icon: L.divIcon({ html: `<div style="display:flex; flex-direction:column; align-items:center;"><div style="font-size:20px; background:#fff; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border:3px solid #ffcf00;">🏢</div><div style="margin-top:4px; font-size:11px; font-weight:700; color:#d97706; text-shadow:-1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; white-space:nowrap;">넷마블 컴퍼니</div></div>`, className: '', iconSize: [100, 60] }) 
        }).addTo(map);

        // ✅ 지도 빈 공간 클릭 시 선택 해제
        map.on('click', function() {
            if (selectedMarkerId !== null) {
                closeDetail();
            }
        });

        try {
            await initFirebase();
            const res = await fetch(`./data/restaurants.json?v=${Date.now()}`);
            if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
            restaurantsData = await res.json();
            restaurantsData = restaurantsData.filter(r => r.name !== 'Dev_Test');
            filterData();
        } catch(e) { 
            console.error('Data fetch error:', e); 
            document.getElementById('restaurantCards').innerHTML = `<div style="padding: 20px; text-align: center; color: #ef4444; font-size: 0.9em; font-weight: 700;">데이터를 불러오지 못했습니다.<br>새로고침 해주세요.</div>`;
        }
    }

    // ✅ 마커 아이콘 생성 함수 (선택 여부에 따라 다른 디자인)
    function createIcon(name, isSelected = false) {
        if (isSelected) {
            // 선택된 마커: 물방울 스타일 + 굵은 글씨
            return L.divIcon({
                html: `<div style="display:flex; flex-direction:column; align-items:center;">
                    <div style="width:30px;height:30px;background:rgba(56,189,248,0.9);border:2px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;animation:marker-focus 0.4s forwards;">
                        <div style="width:10px;height:10px;background:#fff;border-radius:50%;transform:rotate(45deg);"></div>
                    </div>
                    <div style="margin-top:4px; font-size:11px; font-weight:700; color:#0c3060; text-shadow:-1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; white-space:nowrap;">${name}</div>
                </div>
                <style>@keyframes marker-focus { 100% { transform: scale(1.3) translateY(-8px) rotate(-45deg); } }</style>`,
                className: '',
                iconSize: [100, 60],
                iconAnchor: [50, 30]
            });
        } else {
            // 기본 마커: 포크 이모지 + 작고 얇은 글씨
            return L.divIcon({
                html: `<div style="display:flex; flex-direction:column; align-items:center;">
                    <div style="width:30px; height:30px; background:#fff; border:2.5px solid #3b82f6; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px;">🍴</div>
                    <div style="margin-top:3px; font-size:9px; font-weight:500; color:#334155; text-shadow:-0.5px -0.5px 0 #fff, 0.5px -0.5px 0 #fff, -0.5px 0.5px 0 #fff, 0.5px 0.5px 0 #fff; white-space:nowrap;">${name}</div>
                </div>`,
                className: '',
                iconSize: [100, 60],
                iconAnchor: [50, 30]
            });
        }
    }

    window.filterData = function() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const p = document.getElementById('priceFilter').value;
        const isD = document.getElementById('dinnerToggle').classList.contains('active');
        
        const filtered = restaurantsData.filter(r => {
            const mQ = r.name.toLowerCase().includes(q);
            const mP = p === 'all' || (p === '7000' ? r.price < 8000 : r.price >= 8000);
            const mD = !isD || (r.hours.includes('석식') || /17:|18:|19:/.test(r.hours));
            return mQ && mP && mD;
        });

        document.getElementById('restaurantCards').innerHTML = filtered.map(r => {
            const isDinner = r.hours.includes('석식') || /17:|18:|19:/.test(r.hours);
            return `
            <div class="restaurant-card" onclick="selectRestaurant(${r.id})">
                <div style="font-weight:700; font-size:0.95em; color:var(--main-blue);">${r.name}</div>
                <div style="font-size:0.8em; color:#64748b; margin-top:3px;">
                    💳 ${r.price.toLocaleString()}원 
                    ${isDinner ? '<span class="dinner-badge">🌙 석식 가능</span>' : ''}
                </div>
            </div>`;
        }).join('');

        // ✅ 마커 다시 그리기 (선택 상태 유지)
        markerLayer.clearLayers();
        markerMap = {};
        filtered.forEach(r => {
            const isSelected = r.id === selectedMarkerId;
            const marker = L.marker([r.lat, r.lng], { 
                icon: createIcon(r.name, isSelected) 
            }).addTo(markerLayer);
            
            markerMap[r.id] = marker;
            
            marker.on('click', function(e) {
                L.DomEvent.stopPropagation(e); // 지도 클릭 이벤트 전파 방지
                selectRestaurant(r.id);
            });
        });
    }

    window.selectRestaurant = function(id) {
        const r = restaurantsData.find(x => x.id === id);
        if (!r) return;
        
        // ✅ 이전 선택 마커 복구
        if (selectedMarkerId !== null && markerMap[selectedMarkerId]) {
            const prevR = restaurantsData.find(x => x.id === selectedMarkerId);
            if (prevR) {
                markerMap[selectedMarkerId].setIcon(createIcon(prevR.name, false));
            }
        }
        
        // ✅ 새 마커 선택
        selectedMarkerId = id;
        if (markerMap[id]) {
            markerMap[id].setIcon(createIcon(r.name, true));
        }
        
        // ✅ 모바일에서는 마커를 위쪽에 표시
        const isMobile = window.innerWidth <= 768;
        map.panTo([isMobile ? r.lat - 0.0006 : r.lat, r.lng]);
        
        document.getElementById('detailName').innerText = r.name;
        document.getElementById('detailDesc').innerText = r.description || "상세 설명이 등록되지 않은 식당입니다.";
        document.getElementById('detailHours').innerText = r.hours || "정보 없음";
        document.getElementById('detailPrice').innerText = `${r.price.toLocaleString()}원`;

        // SNS 버튼 렌더링 (인스타 + 카카오톡 채널)
        let snsHtml = '';
        if (r.instagram) snsHtml += `<a href="${r.instagram}" target="_blank" class="insta-btn">📸 인스타그램<\/a>`;
        if (r.kakaoChannel) snsHtml += `<a href="${r.kakaoChannel}" target="_blank" class="kakao-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="#3C1E1E"><path d="M12 3c-6.627 0-12 4.254-12 9.5 0 3.321 2.161 6.248 5.5 7.91l-1.13 4.144c-.066.241.02.5.213.655a.575.575 0 0 0 .341.111c.119 0 .237-.036.338-.107l4.908-3.414c.6.066 1.21.101 1.83.101 6.627 0 12-4.254 12-9.5S18.627 3 12 3z"/><\/svg> 카톡 채널<\/a>`;
        document.getElementById('snsArea').innerHTML = snsHtml;

        // 한줄평 로드
        loadReviews(id);
        document.getElementById('reviewInput').value = '';
        document.getElementById('reviewCooldownMsg').innerHTML = '';
        document.getElementById('detail-panel').classList.add('open');
    }

    window.closeDetail = function() { 
        document.getElementById('detail-panel').classList.remove('open'); 
        
        // 패널을 닫을 때 선택된 마커 스타일도 초기화
        if (selectedMarkerId !== null) {
            const prevR = restaurantsData.find(x => x.id === selectedMarkerId);
            if (prevR && markerMap[selectedMarkerId]) {
                markerMap[selectedMarkerId].setIcon(createIcon(prevR.name, false));
            }
            selectedMarkerId = null;
        }
    }
    
    window.toggleCollapse = function() { 
        document.getElementById('left-panel').classList.toggle('collapsed'); 
        closeDetail(); 
    }

    window.toggleDinner = function() {
        const b = document.getElementById('dinnerToggle');
        b.classList.toggle('active');
        b.style.background = b.classList.contains('active') ? '#0c3060' : 'rgba(255,255,255,0.7)';
        b.style.color = b.classList.contains('active') ? '#fff' : '#333';
        filterData();
    }
    
    // ✅ 지도 테마(기본/라이트/다크) 3단 토글 함수
    window.toggleMapTheme = function() {
        currentThemeIndex = (currentThemeIndex + 1) % 3; // 0 -> 1 -> 2 -> 0 순환
        localStorage.setItem('woody_map_theme', currentThemeIndex); // 로컬 스토리지에 저장
        
        const t = THEMES[currentThemeIndex];
        const b = document.getElementById('themeToggle');
        
        // 기존 타일 레이어 제거
        if (currentTileLayer) {
            map.removeLayer(currentTileLayer);
        }
        
        // 새 타일 레이어 적용
        currentTileLayer = L.tileLayer(t.url, {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);
        
        // 버튼 스타일 및 텍스트 변경
        b.innerHTML = t.name;
        b.style.background = t.bg;
        b.style.color = t.color;
        b.style.borderColor = (currentThemeIndex === 2) ? '#0f172a' : '#fff';
    }
    
    window.goHome = function() { 
        map.setView([window.innerWidth <= 768 ? homeLoc.lat - 0.0006 : homeLoc.lat, homeLoc.lng], 17); 
        closeDetail(); 
    }

    // ========== 한줄평 시스템 (파이어베이스 연동) ==========
    const COOLDOWN_KEY = 'woody_review_cooldown';
    const COOLDOWN_MS = 60000; // 1분 쿨타임
    let currentDetailId = null;

    window.loadReviews = function(restaurantId) {
        currentDetailId = restaurantId;
        const listEl = document.getElementById('reviewList');
        listEl.innerHTML = '<div class="review-empty">리뷰를 불러오는 중... ⏳</div>';
        
        if (unsubscribeReviews) { unsubscribeReviews(); }
        if (!db) { listEl.innerHTML = '<div class="review-empty">DB 연결 지연 중...</div>'; return; }

        const q = window.fsQuery(
            window.fsCollection(db, `restaurants/${restaurantId}/reviews`), 
            window.fsOrderBy('createdAt', 'desc'), 
            window.fsLimit(20)
        );
        
        unsubscribeReviews = window.fsOnSnapshot(q, (snapshot) => {
            if (currentDetailId !== restaurantId) return; // 뒤늦게 온 응답 무시
            
            if (snapshot.empty) {
                listEl.innerHTML = '<div class="review-empty">아직 한줄평이 없어요. 첫 번째 평가를 남겨 주세요! ✍️</div>';
                return;
            }
            
            let html = '';
            snapshot.forEach((doc) => {
                const rv = doc.data();
                const text = escapeHtml(rv.text || '');
                const nickname = escapeHtml(rv.nickname || '익명');
                
                let dateStr = '';
                if (rv.createdAt) {
                    const date = rv.createdAt.toDate();
                    dateStr = `${date.getMonth()+1}/${date.getDate()} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
                }
                
                html += `
                    <div class="review-item" style="flex-direction: column; gap: 4px;">
                        <div style="font-weight: 800; font-size: 0.8em; color: var(--main-blue);">${nickname}</div>
                        <div style="display: flex; justify-content: space-between; align-items: flex-end; width: 100%;">
                            <div class="review-item-text" style="flex:1;">${text}</div>
                            <div class="review-item-date">${dateStr}</div>
                        </div>
                    </div>
                `;
            });
            listEl.innerHTML = html;
        }, (error) => {
            console.error("Firebase fetch error:", error);
            listEl.innerHTML = '<div class="review-empty">리뷰를 불러오는 데 실패했습니다. 😢</div>';
        });
    }

    window.submitReview = async function() {
        if (currentDetailId === null || !db) return;
        const input = document.getElementById('reviewInput');
        const nickInput = document.getElementById('reviewNickname');
        const text = input.value.trim();
        const nickname = nickInput.value.trim() || '익명';
        
        if (!text) return;
        if (text.length > 50) { alert('한줄평은 50자 이내로 작성해 주세요.'); return; }
        if (nickname.length > 10) { alert('닉네임은 10자 이내로 작성해 주세요.'); return; }

        const lastTime = parseInt(localStorage.getItem(COOLDOWN_KEY) || '0');
        const now = Date.now();
        if (now - lastTime < COOLDOWN_MS) {
            const remaining = Math.ceil((COOLDOWN_MS - (now - lastTime)) / 1000);
            document.getElementById('reviewCooldownMsg').innerHTML = `<div class="review-cooldown-msg">⏳ ${remaining}초 후에 다시 작성할 수 있어요.</div>`;
            return;
        }

        document.getElementById('reviewCooldownMsg').innerHTML = '<div style="font-size: 0.78em; color: var(--main-blue); margin-top: 4px;">등록 중... ✍️</div>';
        
        try {
            await window.fsAddDoc(window.fsCollection(db, `restaurants/${currentDetailId}/reviews`), {
                text: text,
                nickname: nickname,
                createdAt: window.fsServerTimestamp()
            });
            
            localStorage.setItem(COOLDOWN_KEY, String(now));
            input.value = '';
            // 닉네임은 다음 작성 편의를 위해 초기화하지 않습니다
            document.getElementById('reviewCooldownMsg').innerHTML = '';
        } catch (e) {
            console.error("Firebase addDoc error: ", e);
            document.getElementById('reviewCooldownMsg').innerHTML = `<div class="review-cooldown-msg">오류가 발생했습니다. 다시 시도해 주세요.</div>`;
        }
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // Enter 키로 한줄평 등록
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && document.activeElement && document.activeElement.id === 'reviewInput') {
            e.preventDefault();
            submitReview();
        }
    });

    init();
})();
</script>
