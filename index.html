<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Woody-Table</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --main-blue: #0c3060; --tab-width: 70px; --m-tab-height: 55px; --ad-banner-h: 90px; --panel-w: 340px; --bg-sky: rgba(235, 248, 255, 0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* 전체 화면 고정 */
        body, html { width: 100%; height: 100%; overflow: hidden; background: #f0f9ff; }
        
        #app { 
            display: flex; 
            width: 100vw; 
            height: 100vh; 
            flex-direction: row; /* PC 기본: 가로 배치 */
        }

        /* ===== PC 영구 고정 왼쪽 패널 ===== */
        #persistent-left-panel {
            width: var(--panel-w);
            height: 100%;
            background: var(--bg-sky);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 110;
            position: relative;
            flex-shrink: 0;
        }
        #persistent-left-panel .main-title-box { margin: 15px 16px; }
        #persistent-left-panel #plp-list-header { padding: 0 16px 15px; flex-shrink: 0; }
        #persistent-left-panel .filter-row { display: flex; gap: 6px; margin-top: 10px; }
        #persistent-left-panel .filter-item {
            flex: 1.5; padding: 6px 8px; border-radius: 10px; border: 1px solid #fff;
            background: rgba(255,255,255,0.7); font-size: 0.72em; cursor: pointer;
            text-align: center; display: flex; align-items: center; justify-content: center;
            min-height: 32px; white-space: nowrap; font-weight: 700; color: #333; transition: all 0.2s;
        }
        #persistent-left-panel .filter-item:hover { background: rgba(255,255,255,0.9); }
        #persistent-left-panel .home-inline-btn { flex: 0.5; font-size: 1.1em; background: #fff; }
        #persistent-left-panel #plp-list-scroll { flex: 1; overflow-y: auto; padding: 0 16px 20px; }
        #persistent-left-panel .restaurant-card {
            padding: 12px 14px; background: rgba(255,255,255,0.8); border-radius: 12px;
            margin-bottom: 8px; border: 1px solid #fff; cursor: pointer;
            transition: box-shadow 0.15s, transform 0.15s;
        }
        #persistent-left-panel .restaurant-card:hover { box-shadow: 0 4px 12px rgba(12,48,96,0.12); transform: translateY(-1px); }
        #persistent-left-panel .dinner-badge { background: #e0e7ff; color: #4338ca; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; margin-left: 6px; }
        /* 모바일에서는 영구 패널 숨김 */
        @media (max-width: 768px) {
            #persistent-left-panel { display: none !important; }
        }

        /* [PC] 왼쪽 탭 네비게이션 */
        #tab-nav {
            width: var(--tab-width);
            height: 100%;
            background: #fff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            z-index: 2000;
        }

        .tab-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: #9ca3af; border-bottom: 1px solid #f3f4f6; transition: all 0.2s ease-in-out;
        }
        .tab-item.active { background: #eff6ff; color: var(--main-blue); border-left: 4px solid var(--main-blue); }
        .tab-icon { width: 24px; height: 24px; margin-bottom: 6px; transition: all 0.2s; }
        .tab-text { font-size: 11px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; }
        .tab-item:hover { color: #6b7280; }
        .tab-item.active .tab-icon { transform: scale(1.1); stroke-width: 2.5; }

        /* [PC] 오른쪽 컬럼 (콘텐츠 + 광고) */
        #right-column {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 폈팅 식당 상세 팝업 (지도 탭 외에서 사용) */
        #plp-detail-popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 380px;
            max-width: calc(100vw - 32px);
            max-height: 85vh;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            z-index: 9000;
            display: none;
            flex-direction: column;
            overflow: hidden;
            animation: popup-in 0.2s ease;
        }
        #plp-detail-popup.open { display: flex; }
        @keyframes popup-in {
            from { opacity: 0; transform: translate(-50%, -48%); }
            to   { opacity: 1; transform: translate(-50%, -50%); }
        }
        #plp-detail-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 8999;
            backdrop-filter: blur(2px);
        }
        #plp-detail-overlay.open { display: block; }
        .plp-popup-header {
            padding: 20px 20px 12px;
            border-bottom: 1px solid #f1f5f9;
            position: relative;
        }
        .plp-popup-title {
            font-size: 1.25em; font-weight: 800; color: #0c3060;
            padding-right: 30px;
        }
        .plp-popup-close {
            position: absolute; top: 18px; right: 18px;
            cursor: pointer; color: #94a3b8; font-size: 1.2em;
            width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; transition: background 0.15s;
        }
        .plp-popup-close:hover { background: #f1f5f9; color: #475569; }
        .plp-popup-body { padding: 16px 20px 20px; overflow-y: auto; flex: 1; }
        .plp-popup-desc {
            font-size: 0.9em; color: #475569; line-height: 1.6;
            margin-bottom: 14px; word-break: keep-all;
        }
        .plp-popup-info {
            font-size: 0.85em; color: #64748b;
            background: rgba(241,245,249,0.8);
            padding: 12px; border-radius: 10px; margin-bottom: 14px;
        }
        .plp-popup-info p { margin-bottom: 6px; }
        .plp-popup-info p:last-child { margin-bottom: 0; }
        .plp-popup-sns { display: flex; gap: 8px; margin-bottom: 14px; }
        .plp-popup-sns a {
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px 8px; border-radius: 10px; color: #fff;
            text-decoration: none; font-weight: 700; font-size: 0.8em;
        }
        .plp-popup-sns .insta-btn { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .plp-popup-sns .kakao-btn { background: #FEE500; color: #3C1E1E; }
        .plp-popup-map-btn {
            width: 100%; padding: 11px; border: none; border-radius: 12px;
            background: #0c3060; color: #fff; font-weight: 700; font-size: 0.9em;
            cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: background 0.2s;
        }
        .plp-popup-map-btn:hover { background: #1a4a8a; }

        /* [PC] 콘텐츠 영역 */
        #content-area {
            flex: 1;
            height: 100%; /* Leaflet 등 height:100% 자식을 위해 반드시 필요 */
            min-height: 0;
            position: relative;
            overflow: hidden;
        }

        /* [PC] 하단 광고 배너 (728x90) */
        #pc-ad-banner {
            width: 100%; height: 90px; background: #000;
            border-top: 1px solid rgba(255,255,255,0.1);
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
            z-index: 100; transition: width 0.3s ease; flex-shrink: 0;
        }
        .ad-blur-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; filter: blur(12px) brightness(0.4); transform: scale(1.1);
        }
        .ad-main-img {
            position: relative; height: 100%; width: 25%; object-fit: fill; z-index: 1;
        }


        #pc-ad-banner .ad-placeholder {
            width: 728px;
            max-width: 100%;
            height: 90px;
            background: #e2e8f0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #94a3b8;
            font-family: 'Noto Sans KR', sans-serif;
            letter-spacing: 0.5px;
        }

        /* [모바일] 광고 배너 (최상단 고정) */
        #mobile-ad-banner {
            display: none; /* PC에서는 숨김 */
        }

        /* [모바일] PC 광고 숨김 */
        @media (max-width: 768px) {
            #pc-ad-banner { display: none; }
        }

        /* [모바일] UI 대응 */
        @media (max-width: 768px) {
            #app { flex-direction: column; } /* 모바일: 세로 배치 */

            #right-column {
                flex: 1;
                height: auto;
                display: block; /* 모바일에서는 flex 해제 */
            }

            /* 모바일 최상단 광고 배너 */
            #mobile-ad-banner {
                display: flex; align-items: center; justify-content: center;
                position: fixed; top: 0; left: 0; right: 0;
                width: 100%; height: var(--ad-banner-h);
                background: #000; z-index: 4000; overflow: hidden;
            }
            #mobile-ad-banner .ad-placeholder {
                width: 320px;
                max-width: 100%;
                height: 50px;
                background: #e2e8f0;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 11px;
                color: #94a3b8;
                font-family: 'Noto Sans KR', sans-serif;
                letter-spacing: 0.5px;
            }
            
            /* 모바일에서 광고 메인 이미지는 40% 차지하도록 오버라이드 */
            .ad-main-img {
                width: 40%;
            }

            #tab-nav {
                position: fixed;
                bottom: 0; left: 0; right: 0;
                width: 100%;
                height: var(--m-tab-height);
                flex-direction: row;
                border-right: none;
                border-top: 1px solid #e5e7eb;
                padding-bottom: env(safe-area-inset-bottom);
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                z-index: 3000;
            }

            .tab-item { border-bottom: none; border-right: 1px solid transparent; padding: 4px 0; }
            .tab-item.active { border-left: none; border-top: 3px solid var(--main-blue); background: transparent; }
            .tab-icon { width: 20px; height: 20px; margin-bottom: 3px; }
            .tab-text { font-size: 10px; }
            .tab-item.active .tab-icon { stroke-width: 2.2; }

            /* 콘텐츠 영역: 상단 광고 + 하단 탭 높이 제외 */
            #content-area {
                height: calc(100vh - var(--m-tab-height) - var(--ad-banner-h) - env(safe-area-inset-bottom));
                width: 100%;
                margin-top: var(--ad-banner-h);
            }
        }
    </style>
</head>
<body>
<div id="mobile-ad-banner">
    <img src="Image/ad01.jpg" class="ad-blur-bg">
    <img src="Image/ad01.jpg" class="ad-main-img">
</div>

<div id="app">
    <nav id="tab-nav">
        <!-- 지도 홈 -->
        <div class="tab-item active" data-tab="map">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <div class="tab-text">지도 홈</div>
        </div>
        <!-- AI 칼로리 (렌즈) -->
        <div class="tab-item" data-tab="calorie">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 12H16c-.7 2-2 3-4 3s-3.3-1-4-3H2.5"></path>
                <path d="M5.5 5.1L2 12v6c0 1.1.9 2 2 2h16a2 2 0 0 0 2-2v-6l-3.5-6.9A2 2 0 0 0 16.7 4H7.3a2 2 0 0 0-1.8 1.1z"></path>
            </svg>
            <div class="tab-text">AI 렌즈</div>
        </div>
        <!-- 점심 룰렛 -->
        <div class="tab-item" data-tab="game">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M12 2v10l5 5"></path>
                <path d="M12 12 2 12"></path>
            </svg>
            <div class="tab-text">룰렛</div>
        </div>
        <!-- 설정 -->
        <div class="tab-item" data-tab="contact">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            <div class="tab-text">설정</div>
        </div>
    </nav>
    <!-- PC 영구 고정 식당 목록 패널 -->
    <div id="persistent-left-panel">
        <div class="main-title-box">
            <h1 style="display:flex; align-items:center; justify-content:center;">
                <img src="Image/Woody-Table_Logo_02_cropped.png" alt="Woody-Table Logo" style="width:100%; height:auto; max-height:54px; object-fit:contain;">
            </h1>
        </div>
        <div id="plp-list-header">
            <input type="text" id="plpSearchInput" style="width:100%; padding:10px 15px; border-radius:12px; border:1px solid #fff; background:rgba(255,255,255,0.8); font-family:'Noto Sans KR',sans-serif; font-size:0.9em; outline:none;" placeholder="식당 검색..." oninput="plpFilterData()">
            <div class="filter-row">
                <select id="plpRegionFilter" class="filter-item" onchange="plpFilterData()">
                    <option value="all">지역 전체</option>
                </select>
                <div id="plpDinnerToggle" class="filter-item" onclick="plpToggleDinner()">🌙 석식</div>
                <div id="plp-locate-btn" class="filter-item home-inline-btn" onclick="plpMoveToGPS()" title="현재 위치" style="display:flex; align-items:center; justify-content:center;">
                    <div style="width:14px; height:14px; background:#3b82f6; border-radius:50%; border:2px solid #fff; outline:1px solid #3b82f6;"></div>
                </div>
                <div id="plp-home-btn" class="filter-item home-inline-btn" onclick="plpGoHome()">🏠</div>
            </div>
        </div>
        <div id="plp-list-scroll"><div id="plpRestaurantCards"><div style="padding:20px; text-align:center; color:#94a3b8; font-size:0.85em;">불러오는 중...</div></div></div>
    </div>

    <div id="right-column">
        <main id="content-area"></main>
        <!-- PC 전용 하단 광고 배너 -->
        <div id="pc-ad-banner">
            <img src="Image/ad01.jpg" class="ad-blur-bg">
            <img src="Image/ad01.jpg" class="ad-main-img">
        </div>
    </div>
</div>

<!-- 폈팅 식당 상세 팝업 (지도 탭 이외 전용) -->
<div id="plp-detail-overlay" onclick="plpClosePopup()"></div>
<div id="plp-detail-popup">
    <div class="plp-popup-header">
        <div class="plp-popup-title" id="plp-popup-name"></div>
        <div class="plp-popup-close" onclick="plpClosePopup()">✕</div>
    </div>
    <div class="plp-popup-body">
        <div class="plp-popup-desc" id="plp-popup-desc"></div>
        <div class="plp-popup-info">
            <p><strong>🕒 영업 시간</strong><br><span id="plp-popup-hours" style="display:inline-block; margin-top:4px;"></span></p>
            <p style="margin-top:8px;"><strong>💰 가격:</strong> <span id="plp-popup-price"></span></p>
        </div>
        <div class="plp-popup-sns" id="plp-popup-sns"></div>
        <button class="plp-popup-map-btn" onclick="plpGoToMap()">🗺️ 지도에서 보기</button>
    </div>
</div>

<script>
    let currentTab = '';
    function loadTab(tabName) {
        if (currentTab === tabName) return;
        currentTab = tabName;
        document.body.setAttribute('data-tab', tabName);
        
        document.querySelectorAll('.tab-item').forEach(item => {
            item.classList.toggle('active', item.dataset.tab === tabName);
        });

        fetch(`./${tabName}-tab.html?v=${Date.now()}`)
            .then(res => {
                if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                return res.text();
            })
            .then(html => {
                const area = document.getElementById('content-area');
                
                // Live Server 등 dev tools 주입 코드 제거 (끝태그 뒤 잔여물 정리)
                const marker = '<' + '/script>';
                const lastClose = html.lastIndexOf(marker);
                if (lastClose !== -1) {
                    html = html.substring(0, lastClose + marker.length);
                }
                
                area.innerHTML = html;
                
                // 스크립트 강제 실행 로직 (안전한 생성 방식)
                const scripts = area.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.textContent = oldScript.textContent;
                    document.body.appendChild(newScript);
                    newScript.remove();
                });
            })
            .catch(err => {
                console.error('Error loading tab:', err);
                document.getElementById('content-area').innerHTML = 
                    `<div style="display:flex; height:100%; align-items:center; justify-content:center; color:#ef4444; font-weight:700;">
                        탭을 불러오지 못했습니다. (경로 확인 필요)
                    </div>`;
            });
    }

    document.querySelectorAll('.tab-item').forEach(item => {
        item.addEventListener('click', () => loadTab(item.dataset.tab));
    });
    window.addEventListener('load', () => loadTab('map'));

    // ===== PC 영구 패널: 식당 데이터 로딩 및 필터 =====
    (function() {
        const isMobile = () => window.innerWidth <= 768;
        if (isMobile()) return; // 모바일에서는 실행 안 함

        window.plpRestaurantsData = [];

        async function plpLoadData() {
            try {
                const res = await fetch(`./data/restaurants.xlsx?v=${Date.now()}`);
                if (!res.ok) throw new Error(`HTTP error! ${res.status}`);
                const arrayBuffer = await res.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

                const headerMap = {
                    'id': 'id', '이름': 'name', '지역': 'region', '주소': 'address',
                    'lat': 'lat', 'lng': 'lng', '설명': 'description',
                    '가격': 'price', '영업 시간': 'hours',
                    '인스타': 'instagram', '카카오': 'kakaoChannel'
                };
                const headers = rows[0].map(h => headerMap[String(h).trim()] || String(h).trim());

                window.plpRestaurantsData = rows.slice(1)
                    .map(row => { const obj = {}; headers.forEach((key, i) => { obj[key] = row[i]; }); return obj; })
                    .filter(r => r.name && String(r.name).trim() !== '' && String(r.name).trim() !== 'Dev_Test')
                    .map(r => ({
                        id:           parseInt(r.id) || 0,
                        name:         String(r.name).trim(),
                        region:       r.region && String(r.region).trim() !== '' ? String(r.region).trim() : '미지정',
                        address:      r.address ? String(r.address).trim() : '',
                        lat:          parseFloat(r.lat) || 0,
                        lng:          parseFloat(r.lng) || 0,
                        description:  r.description && String(r.description).trim() !== '' ? String(r.description).trim() : '',
                        price:        parseInt(r.price) || 0,
                        hours:        r.hours ? String(r.hours).trim() : '',
                        instagram:    (r.instagram && String(r.instagram).trim() !== '' && String(r.instagram).trim().toLowerCase() !== 'null') ? String(r.instagram).trim() : null,
                        kakaoChannel: (r.kakaoChannel && String(r.kakaoChannel).trim() !== '' && String(r.kakaoChannel).trim().toLowerCase() !== 'null') ? String(r.kakaoChannel).trim() : null
                    }));

                // 지역 옵션 동적 생성
                const regions = [...new Set(window.plpRestaurantsData.map(r => r.region))].filter(r => r && r !== '미지정');
                const regionSelect = document.getElementById('plpRegionFilter');
                regionSelect.innerHTML = '<option value="all">지역 전체</option>';
                regions.forEach(rg => {
                    const opt = document.createElement('option');
                    opt.value = rg; opt.text = rg;
                    regionSelect.appendChild(opt);
                });
                if (window.plpRestaurantsData.some(r => r.region === '미지정')) {
                    const opt = document.createElement('option');
                    opt.value = '미지정'; opt.text = '미지정';
                    regionSelect.appendChild(opt);
                }

                plpFilterData();
            } catch(e) {
                console.error('PLP data load error:', e);
                document.getElementById('plpRestaurantCards').innerHTML =
                    '<div style="padding:20px; text-align:center; color:#ef4444; font-size:0.9em; font-weight:700;">데이터를 불러오지 못했습니다.<br>새로고침 해주세요.</div>';
            }
        }

        window.plpFilterData = function() {
            const q = document.getElementById('plpSearchInput').value.toLowerCase();
            const rFilter = document.getElementById('plpRegionFilter').value;
            const dinnerToggle = document.getElementById('plpDinnerToggle');
            const isD = dinnerToggle ? dinnerToggle.classList.contains('active') : false;

            const filtered = window.plpRestaurantsData.filter(r => {
                const mQ = r.name.toLowerCase().includes(q);
                const mR = rFilter === 'all' || r.region === rFilter;
                const mD = !isD || (r.hours.includes('석식') || /17:|18:|19:/.test(r.hours));
                return mQ && mR && mD;
            });

            document.getElementById('plpRestaurantCards').innerHTML = filtered.map(r => {
                const isDinner = r.hours.includes('석식') || /17:|18:|19:/.test(r.hours);
                return `
                <div class="restaurant-card" onclick="plpSelectRestaurant(${r.id})">
                    <div style="font-weight:700; font-size:0.95em; color:#0c3060;">${r.name}</div>
                    <div style="font-size:0.8em; color:#64748b; margin-top:3px;">
                        💳 ${r.price.toLocaleString()}원
                        ${isDinner ? '<span class="dinner-badge">🌙 석식 가능</span>' : ''}
                    </div>
                </div>`;
            }).join('');
        };

        window.plpToggleDinner = function() {
            const b = document.getElementById('plpDinnerToggle');
            b.classList.toggle('active');
            b.style.background = b.classList.contains('active') ? '#0c3060' : 'rgba(255,255,255,0.7)';
            b.style.color = b.classList.contains('active') ? '#fff' : '#333';
            plpFilterData();
        };

        // 식당 클릭 시: 지도 탭이 활성이면 selectRestaurant 호출, 다른 탭은 폈팅 팝업 표시
        window.plpSelectRestaurant = function(id) {
            if (currentTab === 'map' && typeof window.selectRestaurant === 'function') {
                window.selectRestaurant(id);
            } else {
                plpShowPopup(id);
            }
        };

        window.plpMoveToGPS = function() {
            if (currentTab === 'map' && typeof window.moveToGPS === 'function') {
                window.moveToGPS();
            } else {
                window._pendingAction = 'gps';
                loadTab('map');
            }
        };

        window.plpGoHome = function() {
            if (currentTab === 'map' && typeof window.goHome === 'function') {
                window.goHome();
            } else {
                window._pendingAction = 'home';
                loadTab('map');
            }
        };

        let plpPopupCurrentId = null;

        function plpShowPopup(id) {
            const isPopupOpen = document.getElementById('plp-detail-popup').classList.contains('open');
            if (plpPopupCurrentId === id && isPopupOpen) {
                window.plpClosePopup();
                return;
            }

            const r = window.plpRestaurantsData.find(x => x.id === id);
            if (!r) return;
            plpPopupCurrentId = id;

            document.getElementById('plp-popup-name').innerText = r.name;

            const descEl = document.getElementById('plp-popup-desc');
            descEl.innerText = r.description || '';
            descEl.style.display = r.description ? 'block' : 'none';

            let formattedHours = r.hours || '정보 없음';
            formattedHours = formattedHours.replace(/, /g, '<br>').replace(/,/g, '<br>');
            document.getElementById('plp-popup-hours').innerHTML = formattedHours;
            document.getElementById('plp-popup-price').innerText = `${r.price.toLocaleString()}원`;

            let snsHtml = '';
            if (r.instagram) snsHtml += `<a href="${r.instagram}" target="_blank" class="insta-btn">📸 인스타그램</a>`;
            if (r.kakaoChannel) snsHtml += `<a href="${r.kakaoChannel}" target="_blank" class="kakao-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="#3C1E1E"><path d="M12 3c-6.627 0-12 4.254-12 9.5 0 3.321 2.161 6.248 5.5 7.91l-1.13 4.144c-.066.241.02.5.213.655a.575.575 0 0 0 .341.111c.119 0 .237-.036.338-.107l4.908-3.414c.6.066 1.21.101 1.83.101 6.627 0 12-4.254 12-9.5S18.627 3 12 3z"/></svg> 카톡 채널</a>`;
            const snsEl = document.getElementById('plp-popup-sns');
            snsEl.innerHTML = snsHtml;
            snsEl.style.display = snsHtml ? 'flex' : 'none';

            document.getElementById('plp-detail-popup').classList.add('open');
            document.getElementById('plp-detail-overlay').classList.add('open');
        }

        window.plpClosePopup = function() {
            document.getElementById('plp-detail-popup').classList.remove('open');
            document.getElementById('plp-detail-overlay').classList.remove('open');
            plpPopupCurrentId = null;
        };

        // 팝업에서 '지도에서 보기' 버튼 클릭 시 지도 탭으로 이동 + 선택
        window.plpGoToMap = function() {
            if (plpPopupCurrentId === null) return;
            const id = plpPopupCurrentId;
            plpClosePopup();
            if (currentTab === 'map' && typeof window.selectRestaurant === 'function') {
                window.selectRestaurant(id);
            } else {
                window._pendingSelectId = id;
                loadTab('map');
            }
        };

        plpLoadData();
    })();
</script>
</body>
</html>
